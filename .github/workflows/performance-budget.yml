name: Performance Budget

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

jobs:
  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Analyze bundle size
        run: |
          echo "📊 Bundle Size Analysis"
          du -sh out/ | awk '{print "Total output size: " $1}'
          find out -name "*.js" -exec du -h {} \; | sort -rh | head -10

      - name: Check bundle size limits
        run: |
          TOTAL_SIZE=$(du -sb out/ | awk '{print $1}')
          MAX_SIZE=$((5 * 1024 * 1024))  # 5MB limit

          if [ $TOTAL_SIZE -gt $MAX_SIZE ]; then
            echo "❌ Bundle size exceeded: $(($TOTAL_SIZE / 1024 / 1024))MB > 5MB"
            exit 1
          else
            echo "✅ Bundle size OK: $(($TOTAL_SIZE / 1024 / 1024))MB"
          fi

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start server
        run: npm run start &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 -t 60000

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun --config=./lighthouserc.json || true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
